<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gran Biblioteca de la Luna</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Música de fondo -->
  <audio id="bg-music" loop>
    <source src="src\music\ambiente.mp3" type="audio/mpeg">
    Tu navegador no soporta audio.
  </audio>

  <!-- Botón para activar/desactivar música -->
  <button id="music-btn" class="music-toggle" onclick="toggleMusic()">🔇</button>

  <div class="container">
    <h1>Gran Biblioteca de la Luna</h1>
    <div class="menu">
      <!-- Botón de inicio -->
      <button id="start-btn"><i>Toc. Toc. Toc.</i></button>

      <!-- Botones menú-->
      <button id="menuBtn1" class="hidden" onclick="loadContext('enciclopedia'); openEnciclopedia()">Enciclopedia</button>
      <button id="menuBtn2" class="hidden" onclick="loadContext('misiones')">Misiones</button>
      <button id="menuBtn3" class="hidden" onclick="loadContext('mapa')">Mapa</button>
    </div>
  </div>

  <!-- Menú de enciclopedia -->
  <div id="encyclopedia-menu" class="hidden"></div>

  <!-- Contenedor Entradas -->
  <div id="entry-view" class="hidden entry-container"></div>

  <!-- CUADRO DE DIÁLOGO -->
  <div id="dialogue-box" class="dialogue hidden">
    <img id="dialogue-portrait" src="" alt="personaje">
    <div id="dialogue-text"></div>
  </div>

  <!--
  ------------------------------------------------------------
          JAVASCRIPT  
  ------------------------------------------------------------
  -->

  <script>
    //Inicio y entrada al menú
    const startBtn = document.getElementById('start-btn');
    const menuDiv = document.querySelector('.menu');
    const menuBtn1 = document.getElementById('menuBtn1');
    const menuBtn2 = document.getElementById('menuBtn2');
    const menuBtn3 = document.getElementById('menuBtn3');
    const dialogueBox = document.getElementById('dialogue-box');


    //Colección Enciclopedia
    const enciclopediaData = {
      miembros: [
        {
          category: "miembros",
          id: "zero",
          title: "Zero. La Pluma del Destino",
          portrait: "src/img/pjs/Zero.jpeg",
          content: `
            <p>Hoja de escarcha y hechicera de hielo, aventurera de rango citrino en el gremio de aventureros de Gerdim.</p>
            <p>Maldita como una de los sangrientos, se crió como hoja de escarcha en la orden de la Luna. Allí vivió hasta que un astado del volcán anciano llamado Gohrm atacó el lugar y la secuestró. Más tarde, sirvió bajo amenaza al llamado Rey de los Monstruos hasta que Mushoku la derrotó y se unió al gremio de Fironia.</p>
            <p>Tras pactar con la arconte del destino, se le concedió una pluma con voluntad propia y la habilidad de conocer fragmentos del futuro.</p>
            <p>Recientemente, lidió con un parásito demoníaco, Ematos, por haber bebido la sangre de El Ser Original. Este demonio devoró su maldición y fue finalmente extraído por Krieff Rodion II.</p>
            <p>Actualmente, es esposa de Mushoku y madre de Mash y Olivia, además de ser la mente maestra del gremio.</p>
            <p><i>Si es imposible o no, lo acabaremos descubriendo. ¿Qué clase de excusa de hoja de escarcha sería si dejase de buscar la respuesta?</i></p>
          `
        },
        {
          category: "miembros",
          id: "kumo",
          title: "Kumo. La Lanza de la Culpa",
          portrait: "src/img/pjs/Kumo.png",
          content: `
            <p>Karitasi elegido para ascender la torre Solar y aventurero de rango citrino en el gremio de aventureros de Gerdim.</p>
            <p>Una vez pobre y marginado en las tierras de oriente, fue rescatado de los abusos de los nobles por Piers y pasó a convertirse en un aventurero en Fironia. Tras ser descubierto por Tari como un Karitasi, comenzó su entrenamiento en Arcadi.</p>
            <p>Tras pactar con el arconte de la culpa, se le concedió una lanza mágica con las habilidades para vencer a los enemigos que le superaron en el pasado.</p>
            <p>Recientemente, ha vivido en Hikaria y servido como paladín de Karis Segundo, el último de los arcontes de Arcadi. Allí conoció a Sarah Bright, una persona muy especial para él.</p>
            <p>Busca activamente la manera de derrotar a Bosvoros y proteger al mundo de la catástrofe que él tuvo que vivir con la caída del Reino Solar y la muerte de sus aliados y su maestra.</p>
            <p><i>He visto a tantas personas sacrificar tanto en nombre de la esperanza que intentan arrebatarnos... Ya no puedo quedarme de brazos cruzados, cargaré sobre mis hombros el peso de su sacrificio hasta terminar con quién lo empezó todo.</i></p>
          `
        }
      ],
      lugares: [],
      demonios: []
    };

    startBtn.addEventListener('click', () => {
      startBtn.classList.add('hidden'); // ocultamos el botón "Comenzar"
      setTimeout(() => {
        menuBtn1.classList.remove('hidden');
        menuBtn2.classList.remove('hidden');
        menuBtn3.classList.remove('hidden');
      }, 2000);
      loadContext('menu'); // cargamos el diálogo inicial
    });

    //Música
    const music = document.getElementById('bg-music');
    const musicBtn = document.getElementById('music-btn');
    let isPlaying = false;

    // Estado inicial
    musicBtn.textContent = '🔇'; // icono apagado al cargar la página

    function toggleMusic() {
      if (isPlaying) {
        music.pause();
        isPlaying = false;
        musicBtn.textContent = '🔇'; // icono apagado
      } else {
        music.play();
        isPlaying = true;
        musicBtn.textContent = '🔊'; // icono encendido
      }
    }

    document.body.addEventListener('click', () => {
      music.play();
      isPlaying = true;
      musicBtn.textContent = '🔊';
    }, { once: true });


    //Lógica de los diálogos
    const dialogues = {
      menu: [
        {
          id: 1,
          portrait: 'src/img/pjs/Zero.jpeg',
          text: '¡Bienvenido! ¿Tú tampoco podías dormir?'
        },
        {
          id: 2,
          portrait: 'src/img/pjs/Kumo.png',
          text: '(Gulp.) Ey. No le dirás a Zero que estoy comiendo en la biblioteca... ¿verdad?'
        }
      ],
      mapa: [
        {
          id: 1,
          portrait: 'src/img/pjs/Zero.jpeg',
          text: 'Aún no tenemos ningún mapa...'
        },
        {
          id: 2,
          portrait: 'src/img/pjs/Kumo.png',
          text: 'Sería de ayuda, pero aún no tenemos ninguno.'
        }
      ],
      misiones: [
        {
          id: 1,
          portrait: 'src/img/pjs/Zero.jpeg',
          text: 'Creo que ahora tenemos algo MÁS IMPORTANTE de lo que preocuparnos. ¿No crees?'
        },
        {
          id: 2,
          portrait: 'src/img/pjs/Kumo.png',
          text: 'Ahora solo tengo un objetivo en la cabeza...'
        }
      ],
      enciclopedia: [
        {
          id: 1,
          portrait: 'src/img/pjs/Zero.jpeg',
          text: 'Aún no hay muchos, pero espero que encuentres el que buscas.'
        },
        {
          id: 2,
          portrait: 'src/img/pjs/Kumo.png',
          text: 'Hay... demasiados libros.'
        }
      ],
      miembros: [
        {
          id: 1,
          portrait: 'src/img/pjs/Zero.jpeg',
          text: '¿Hay alguien de quién quieras descubrir algo nuevo?'
        },
        {
          id: 2,
          portrait: 'src/img/pjs/Kumo.png',
          text: 'Que suerte contar con tantos amigos. Oye, ¿te apetece un ramen?'
        }
      ],
      lugares: [
        {
          id: 1,
          portrait: 'src/img/pjs/Zero.jpeg',
          text: 'Que tontería, todo el mundo sabe que no hay nada más allá de la ciudad. Espera... ¿Qué acabo de decir? ...'
        },
        {
          id: 2,
          portrait: 'src/img/pjs/Kumo.png',
          text: '...'
        }
      ],
      demonios: [
        {
          id: 1,
          portrait: 'src/img/pjs/Zero.jpeg',
          text: 'No hay ninguno, creo que es cosa de Draethkor...'
        },
        {
          id: 2,
          portrait: 'src/img/pjs/Kumo.png',
          text: '...'
        }
      ],
      zero: [
        {
          id: 1,
          portrait: 'src/img/pjs/Zero.jpeg',
          text: '¿Eh? Podrías haberme preguntado, ¿sabes?'
        },
        {
          id: 2,
          portrait: 'src/img/pjs/Kumo.png',
          text: 'Menos mal que la tenemos a ella...'
        }
      ],
      kumo: [
        {
          id: 1,
          portrait: 'src/img/pjs/Zero.jpeg',
          text: 'Es... un aliado valioso.'
        },
        {
          id: 2,
          portrait: 'src/img/pjs/Kumo.png',
          text: 'Ey. ¿Qué estás leyendo?'
        }
      ]
    };

    let typingInterval = null;

    function loadContext(context) {
      const box = document.getElementById('dialogue-box');
      const textEl = document.getElementById('dialogue-text');
      const portraitEl = document.getElementById('dialogue-portrait');

      box.classList.remove('hidden');

      if (typingInterval) {
        clearInterval(typingInterval);
      }

      textEl.textContent = '';

      const pool = dialogues[context];
      const randomDialogue = pool[Math.floor(Math.random() * pool.length)];

      portraitEl.src = randomDialogue.portrait;

      let i = 0;
      const text = randomDialogue.text;

      typingInterval = setInterval(() => {
        textEl.textContent += text[i];
        i++;

        if (i >= text.length) {
          clearInterval(typingInterval);
        }
      }, 30);
    }



    function openEnciclopedia() {
  // ocultar elementos anteriores
  document.querySelector('h1').classList.add('hidden');
  document.querySelector('.menu').classList.add('hidden');

  const container = document.getElementById('encyclopedia-menu');
  container.classList.remove('hidden');
  container.innerHTML = ''; // limpiar contenido previo

  // crear botones dinámicamente
  Object.keys(enciclopediaData).forEach(categoria => {
    const btn = document.createElement('button');
    btn.classList.add('book-button');

    // capitalizar nombre
    btn.textContent = categoria.charAt(0).toUpperCase() + categoria.slice(1);

    btn.onclick = () => {
      openCategory(categoria);
      loadContext(categoria);
    };

    container.appendChild(btn);
  });
      
  // botón "Volver" al final
  const backBtn = document.createElement('button');
  backBtn.classList.add('book-button');
  backBtn.textContent = 'Volver';
  backBtn.onclick = () => {
    container.innerHTML = '';
    document.querySelector('.menu').classList.remove('hidden');
    document.querySelector('h1').classList.remove('hidden');
    loadContext('menu');
  };
  container.appendChild(backBtn);
}

    
function openCategory(categoria) {
  const container = document.getElementById('encyclopedia-menu');
  container.innerHTML = '';

  const items = enciclopediaData[categoria];

  items.forEach(item => {
    const btn = document.createElement('button');
    btn.classList.add('book-button');
    btn.textContent = item.title;

    btn.onclick = () => {
      openEntry(item);
      loadContext(item.id);
    };

    container.appendChild(btn);  
  });

    // botón "Volver" al final
  const backBtn = document.createElement('button');
  backBtn.classList.add('book-button');
  backBtn.textContent = 'Volver';
  backBtn.onclick = () => {
    container.innerHTML = '';
    openEnciclopedia();
    loadContext('enciclopedia');
  };
  container.appendChild(backBtn);
}

    function openEntry(item) {
  const container = document.getElementById('encyclopedia-menu');
  const entryView = document.getElementById('entry-view');

  // ocultar botones
  container.classList.add('hidden');

  // mostrar vista
  entryView.classList.remove('hidden');

  entryView.innerHTML = `
    <div class="entry-left">
      <img src="${item.portrait}" alt="${item.title}">
    </div>
    <div class="entry-right">
      <h2>${item.title}</h2>
      ${item.content}
      <button class="back-btn" onclick="backToMenu(); loadContext('menu')">Volver al menú</button>
    </div>
  `;
}

    function backToMenu() {
  const entryView = document.getElementById('entry-view');

  // ocultar entrada
  entryView.classList.add('hidden');

  // limpiar contenido
  entryView.innerHTML = '';

  // mostrar menú principal
  document.querySelector('.menu').classList.remove('hidden');
  document.querySelector('h1').classList.remove('hidden');
}
  </script>
</body>

</html>

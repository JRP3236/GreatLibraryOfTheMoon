    let typingInterval = null;

    function loadContext(context) {
      const box = document.getElementById('dialogue-box');
      const textEl = document.getElementById('dialogue-text');
      const portraitEl = document.getElementById('dialogue-portrait');

      box.classList.remove('hidden');

      if (typingInterval) {
        clearInterval(typingInterval);
      }

      textEl.textContent = '';

      const pool = dialogues[context];
      //const randomDialogue = pool[Math.floor(Math.random() * pool.length)]; //Funcionamiento normal
      const randomDialogue = pool[Math.floor((Math.random() * (pool.length-3))+3)]; //Con 5 narradores, usa solo a Piers y CB

      portraitEl.src = randomDialogue.portrait;

      let i = 0;
      const text = randomDialogue.text;

      typingInterval = setInterval(() => {
        textEl.textContent += text[i];
        i++;

        if (i >= text.length) {
          clearInterval(typingInterval);
        }
      }, 30);
    }



    function openEnciclopedia() {
  // ocultar elementos anteriores
  document.querySelector('h1').classList.add('hidden');
  document.querySelector('.menu').classList.add('hidden');

  const container = document.getElementById('encyclopedia-menu');
  container.classList.remove('hidden');
  container.innerHTML = ''; // limpiar contenido previo

  // crear botones dinámicamente
  Object.keys(enciclopediaData).forEach(categoria => {
    const btn = document.createElement('button');
    btn.classList.add('book-button');

    // capitalizar nombre
    btn.textContent = categoria.charAt(0).toUpperCase() + categoria.slice(1);

    btn.onclick = () => {
      openCategory(categoria);
      loadContext(categoria);
    };

    container.appendChild(btn);
  });
      
  // botón "Volver" al final
  const backBtn = document.createElement('button');
  backBtn.classList.add('book-button');
  backBtn.textContent = 'Volver';
  backBtn.onclick = () => {
    container.innerHTML = '';
    document.querySelector('.menu').classList.remove('hidden');
    document.querySelector('h1').classList.remove('hidden');
    loadContext('menu');
  };
  container.appendChild(backBtn);
}

    
function openCategory(categoria) {
  const container = document.getElementById('encyclopedia-menu');
  container.innerHTML = '';

  const items = enciclopediaData[categoria];

  items.forEach(item => {
    const btn = document.createElement('button');
    btn.classList.add('book-button');
    btn.textContent = item.title;

    btn.onclick = () => {
      openEntry(item);
      loadContext(item.id);
    };

    container.appendChild(btn);  
  });

    // botón "Volver" al final
  const backBtn = document.createElement('button');
  backBtn.classList.add('book-button');
  backBtn.textContent = 'Volver';
  backBtn.onclick = () => {
    container.innerHTML = '';
    openEnciclopedia();
    loadContext('enciclopedia');
  };
  container.appendChild(backBtn);
}

    function openEntry(item) {
  const container = document.getElementById('encyclopedia-menu');
  const entryView = document.getElementById('entry-view');

  // ocultar botones
  container.classList.add('hidden');

  // mostrar vista
  entryView.classList.remove('hidden');

  entryView.innerHTML = `
    <div class="entry-left">
      <img src="${item.portrait}" alt="${item.title}">
    </div>
    <div class="entry-right">
      <h2>${item.title}</h2>
      ${item.content}
      <button class="back-btn" onclick="backToMenu(); loadContext('menu')">Volver al mostrador</button>
    </div>
  `;
}

    function backToMenu() {
  const entryView = document.getElementById('entry-view');

  // ocultar entrada
  entryView.classList.add('hidden');

  // limpiar contenido
  entryView.innerHTML = '';

  // mostrar menú principal
  document.querySelector('.menu').classList.remove('hidden');
  document.querySelector('h1').classList.remove('hidden');
}
